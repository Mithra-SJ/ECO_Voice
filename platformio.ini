; PlatformIO Project Configuration File
; ECO_Voice — ESP32-S3 + ESP-IDF
[platformio]
src_dir = main
boards_dir = boards

[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1-n16r8
framework = espidf
extra_scripts = pre:pio_sr_models.py

; Tell ESP-IDF the main component is in src/
;board_build.main_src_dir = src

; ── Flash Settings ─────────────────────────────────────────
board_build.flash_size = 16MB
board_build.partitions = partitions.csv

; ── PSRAM (required for ESP-SR models) ────────────────────
board_build.arduino.memory_type = qio_opi

; ── ESP-SR Component Manager ──────────────────────────────

; ── Build Flags (MERGED — cannot have two build_flags) ────
build_flags =
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -std=c++17
    -Wno-deprecated-declarations

; ── Upload Settings ────────────────────────────────────────
upload_speed = 460800
upload_protocol = esptool
upload_flags =
    --before=default_reset
    --after=hard_reset
    --chip=esp32s3

; ── Monitor ────────────────────────────────────────────────
monitor_speed = 115200
